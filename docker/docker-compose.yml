services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alphaquant
      POSTGRES_PASSWORD: alphaquant_dev_only
      POSTGRES_DB: alphaquant
    ports:
      - "5432:5432"
    volumes:
      - aq_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphaquant -d alphaquant"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file:
      - ../config/.env.example
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      TRADING_MODE: paper
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

volumes:
  aq_pg_data:
