# API service (hamzah-ka-ai-agent public URL).
# Scanner service: Settings → Config-as-code → use railway.scanner.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile.api"
watchPatterns = [
  "api/**",
  "shared/**",
  "services/**",
  "database/**",
  "data-layer/**",
  "risk-engine/**",
  "strategies/**",
  "indicators/**",
  "docker/**",
  "config/**",
  "scripts/**",
  "pyproject.toml",
  "railway.toml",
]

[deploy]
startCommand = "sh -c 'uvicorn alphaquant_api.main:app --host 0.0.0.0 --port ${PORT:-8000} --app-dir api'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 120
