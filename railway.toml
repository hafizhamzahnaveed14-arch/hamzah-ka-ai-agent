# Default Railway service = API.
# For scanner: duplicate service, override start command to:
#   python scripts/paper_scanner.py
# Do NOT set healthcheckPath on the scanner — it has no HTTP server.
# Set /health only on the API service in Railway UI if you want it.

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile.api"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
