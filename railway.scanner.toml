# Scanner worker — no HTTP, no healthcheck.
# In Railway: Settings → Config-as-code → Config file path = railway.scanner.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile.api"
watchPatterns = [
  "scripts/**",
  "shared/**",
  "services/**",
  "database/**",
  "data-layer/**",
  "risk-engine/**",
  "strategies/**",
  "indicators/**",
  "docker/**",
  "config/**",
  "pyproject.toml",
  "railway.scanner.toml",
]

[deploy]
startCommand = "python scripts/paper_scanner.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
