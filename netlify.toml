[build]
  # No "base" — Netlify UI auto-fills Package+Publish when base is set and doubles paths.
  # Use Package directory = frontend in UI; leave Base empty.
  command = "npm --prefix frontend ci && npm --prefix frontend run build"
  publish = "frontend/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
