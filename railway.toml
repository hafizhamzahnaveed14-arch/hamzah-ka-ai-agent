# Default Railway service = API.
# Duplicate this service in the dashboard for the scanner and override start command:
#   python scripts/paper_scanner.py

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile.api"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 30
